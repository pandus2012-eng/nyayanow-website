<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - NyayaNow</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Sans Pro', sans-serif;
            background: linear-gradient(135deg, #f0fdfa 0%, #fef3c7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-container {
            max-width: 600px;
            text-align: center;
            background: white;
            padding: 3rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .error-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-icon i { color: white; }
        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 6rem;
            color: #14b8a6;
            margin-bottom: 1rem;
            line-height: 1;
        }
        h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            color: #1f2937;
            margin-bottom: 1rem;
        }
        p {
            color: #6b7280;
            font-size: 1.125rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.875rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(to right, #14b8a6, #0d9488);
            color: white;
        }
        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(20,184,166,0.3);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: white;
            color: #14b8a6;
            border: 2px solid #14b8a6;
        }
        .btn-secondary:hover {
            background: #f0fdfa;
        }
        .helpful-links {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e7eb;
        }
        .helpful-links h3 {
            font-size: 1.125rem;
            color: #374151;
            margin-bottom: 1rem;
        }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        .link-item {
            text-align: left;
            padding: 0.75rem 1rem;
            background: #f9fafb;
            border-radius: 0.5rem;
            text-decoration: none;
            color: #374151;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .link-item:hover {
            background: #f0fdfa;
            color: #14b8a6;
        }
        .link-item i {
            color: #14b8a6;
            flex-shrink: 0;
        }
        @media (max-width: 640px) {
            h1 { font-size: 4rem; }
            h2 { font-size: 1.5rem; }
            .links-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i data-lucide="alert-triangle" style="width:60px;height:60px;"></i>
        </div>
        
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Oops! The page you're looking for doesn't exist. It might have been moved or deleted.</p>
        
        <div class="button-group">
            <a href="index.html" class="btn btn-primary">
                <i data-lucide="home" style="width:20px;height:20px;"></i>
                Go to Homepage
            </a>
            <a href="contact.html" class="btn btn-secondary">
                <i data-lucide="phone" style="width:20px;height:20px;"></i>
                Contact Us
            </a>
        </div>
        
        <div class="helpful-links">
            <h3>Popular Pages:</h3>
            <div class="links-grid">
                <a href="service-page-template.html" class="link-item">
                    <i data-lucide="building-2" style="width:16px;height:16px;"></i>
                    Company Registration
                </a>
                <a href="gst-registration.html" class="link-item">
                    <i data-lucide="file-text" style="width:16px;height:16px;"></i>
                    GST Registration
                </a>
                <a href="itr-accounting.html" class="link-item">
                    <i data-lucide="calculator" style="width:16px;height:16px;"></i>
                    ITR Filing
                </a>
                <a href="trademark-registration.html" class="link-item">
                    <i data-lucide="award" style="width:16px;height:16px;"></i>
                    Trademark
                </a>
            </div>
        </div>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
